services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: infrawatch
      POSTGRES_USER: infrawatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infrawatch_secret}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrawatch -d infrawatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.engine
    restart: unless-stopped
    environment:
      INFRAWATCH_CONFIG: /etc/infrawatch/infrawatch.yaml
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      DATABASE_URL: postgres://infrawatch:${POSTGRES_PASSWORD:-infrawatch_secret}@timescaledb:5432/infrawatch?sslmode=disable
    volumes:
      - ./engine.yaml:/etc/infrawatch/infrawatch.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      retries: 3

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      INFRAWATCH_CONFIG: /etc/infrawatch/infrawatch.yaml
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET:-}
      DATABASE_URL: postgres://infrawatch:${POSTGRES_PASSWORD:-infrawatch_secret}@timescaledb:5432/infrawatch?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - ./engine.yaml:/etc/infrawatch/infrawatch.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  redis_data:
  timescale_data:
