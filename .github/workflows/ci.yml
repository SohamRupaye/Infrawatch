name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build, vet, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -cover

  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          # api/engine build from the repo root (need go.mod); frontend builds
          # from apps/frontend, matching docker/docker-compose.yml's contexts.
          - { name: api, context: ., dockerfile: docker/Dockerfile.api }
          - { name: engine, context: ., dockerfile: docker/Dockerfile.engine }
          - { name: frontend, context: apps/frontend, dockerfile: ../../docker/Dockerfile.frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.image.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: infrawatch-${{ matrix.image.name }}:ci
